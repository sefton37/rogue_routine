<!DOCTYPE html>
<html lang="en">
<head>
  {{ partial "head.html" . }}
  {{ block "head" . }}{{ end }}
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  {{ partial "nav.html" . }}
  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  {{ $siteJS := resources.Get "js/site.js" | fingerprint }}
  <script src="{{ $siteJS.RelPermalink }}"></script>
  {{ block "scripts" . }}{{ end }}
</body>
</html>
