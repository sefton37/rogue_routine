server {
    listen 8081;
    server_name localhost;
    root /home/kellogg/dev/rogue_routine/public;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://analytics.brengel.com; style-src 'self'; img-src 'self' data:; connect-src 'self' https://analytics.brengel.com; frame-ancestors 'none'" always;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|webp|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    access_log off;
    error_log /var/log/nginx/rogueroutine-error.log warn;
}
